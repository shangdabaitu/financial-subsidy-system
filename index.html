<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>财务补助核销</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>财务补助核销</h1>
      <button class="btn btn-primary" id="btn-add">+ 新增</button>
    </header>

    <main class="app-main">
      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">总申请数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-label">待核销</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-success">0</div>
          <div class="stat-label">核销成功</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-failed">0</div>
          <div class="stat-label">核销失败</div>
        </div>
      </div>

      <div class="status-tabs">
        <div class="tab active" data-status="">全部 <span class="badge" id="badge-total">0</span></div>
        <div class="tab" data-status="待核销">待核销 <span class="badge" id="badge-pending">0</span></div>
        <div class="tab" data-status="核销成功">核销成功 <span class="badge" id="badge-success">0</span></div>
        <div class="tab" data-status="核销失败">核销失败 <span class="badge" id="badge-failed">0</span></div>
      </div>

      <div class="loading" id="loading" style="display:none;">加载中...</div>
      <div class="empty" id="empty" style="display:none;">暂无数据</div>

      <div class="table-container" id="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>序号</th>
              <th>出差开始日期</th>
              <th>出差结束日期</th>
              <th>出差天数</th>
              <th>应补助天数</th>
              <th>住宿天数</th>
              <th>住宿总花费</th>
              <th>出差天数应补助金额</th>
              <th>住宿应返还金额</th>
              <th>bm 补助金额</th>
              <th>总应补助金额</th>
              <th>核销状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div class="card-list" id="card-list"></div>

      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <!-- 新增弹窗 -->
  <div class="modal" id="modal-add" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>新增补助申请</h3>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <form id="form-add">
          <div class="form-row">
            <div class="form-field">
              <label>出差开始日期 <span class="required">*</span></label>
              <input type="date" name="trip_start_date" required>
            </div>
            <div class="form-field">
              <label>出差结束日期 <span class="required">*</span></label>
              <input type="date" name="trip_end_date" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>出差天数</label>
              <input type="text" name="trip_days" readonly>
            </div>
            <div class="form-field">
              <label>应补助天数</label>
              <input type="text" name="subsidy_days" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>住宿天数</label>
              <input type="text" name="stay_days" readonly>
              <div class="hint">等于出差天数 - 1</div>
            </div>
            <div class="form-field">
              <label>住宿总花费 <span class="required">*</span></label>
              <input type="number" name="stay_total_cost" step="0.01" min="0" placeholder="请输入金额" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>出差天数应补助金额</label>
              <input type="text" name="trip_subsidy_amount" readonly>
            </div>
            <div class="form-field">
              <label>住宿应返还金额</label>
              <input type="text" name="stay_refund_amount" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>bm 补助金额</label>
              <input type="number" name="bm_subsidy_amount" step="0.01" min="0" placeholder="选填">
            </div>
            <div class="form-field">
              <label>总应补助金额</label>
              <input type="text" name="total_subsidy_amount" readonly>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close>取消</button>
        <button class="btn btn-primary" id="btn-save-add">保存</button>
      </div>
    </div>
  </div>

  <!-- 核销弹窗 -->
  <div class="modal" id="modal-writeoff" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>核销</h3>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <form id="form-writeoff">
          <input type="hidden" name="id">
          <div class="form-field">
            <label>总应补助金额</label>
            <input type="text" name="total_subsidy_amount" readonly>
          </div>
          <div class="form-field">
            <label>实际补助金额 <span class="required">*</span></label>
            <input type="number" name="actual_subsidy_amount" step="0.01" min="0" placeholder="请输入实际补助金额" required>
          </div>
          <div class="form-field">
            <label>补助差额</label>
            <input type="text" name="subsidy_diff_amount" readonly>
            <div class="hint">总应补助金额 - 实际补助金额；绝对值小于 5 自动核销成功</div>
          </div>
          <div class="form-field">
            <label>失败原因</label>
            <textarea name="fail_reason" rows="3" placeholder="选填，最多 500 字符" maxlength="500"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close>取消</button>
        <button class="btn btn-primary" id="btn-save-writeoff">确认</button>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal" id="modal-detail" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>核销详情</h3>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body" id="detail-body">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close>关闭</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
